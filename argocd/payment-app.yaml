apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: payment-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/SaratA8717/payment-app-gitops-config.git
    targetRevision: HEAD
    path: dev/payment-app

  destination:
    server: https://kubernetes.default.svc
    namespace: payment

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true